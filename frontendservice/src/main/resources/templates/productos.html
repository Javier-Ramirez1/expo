<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h1 class="mb-4">
        Gestión de Productos
    </h1>

    <a href="/"
       class="btn btn-secondary mb-3">
        Volver al Inicio
    </a>

    <div class="card mb-4">

        <div class="card-header">

            <span th:if="${producto.id == null}">
                Registrar Producto
            </span>

            <span th:if="${producto.id != null}">
                Editar Producto
            </span>

        </div>

        <div class="card-body">

            <form th:action="@{/productos/guardar}"
                  method="post"
                  th:object="${producto}">

                <input type="hidden"
                       th:field="*{id}">

                <div class="mb-3">

                    <label>Nombre</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{nombre}"
                           required>

                </div>

                <div class="mb-3">

                    <label>Precio</label>

                    <input type="number"
                           min="0.01"
                           step="0.01"
                           class="form-control"
                           th:field="*{precio}"
                           required>

                </div>

                <div class="mb-3">

                    <label>Stock</label>

                    <input type="number"
                           min="0"
                           class="form-control"
                           th:field="*{stock}"
                           required>

                </div>

                <button type="submit"
                        class="btn btn-success">

                    <span th:if="${producto.id == null}">
                        Guardar Producto
                    </span>

                    <span th:if="${producto.id != null}">
                        Actualizar Producto
                    </span>

                </button>

            </form>

        </div>

    </div>

    <div class="card">

        <div class="card-header">
            Lista de Productos
        </div>

        <div class="card-body">

            <table class="table table-striped">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="p : ${productos}">

                    <td th:text="${p.id}"></td>

                    <td th:text="${p.nombre}"></td>

                    <td th:text="${p.precio}"></td>

                    <td th:text="${p.stock}"></td>

                    <td>

                        <a th:href="@{/productos/editar/{id}(id=${p.id})}"
                           class="btn btn-warning btn-sm">

                            Editar

                        </a>

                        <a th:href="@{/productos/eliminar/{id}(id=${p.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Eliminar producto?')">

                            Eliminar

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
