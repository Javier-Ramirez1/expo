<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Gestión de Pedidos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h1 class="mb-4">
        Gestión de Pedidos
    </h1>

    <a href="/"
       class="btn btn-secondary mb-3">
        Volver al Inicio
    </a>

    <div class="card mb-4">

        <div class="card-header">

            <span th:if="${pedido.id == null}">
                Registrar Pedido
            </span>

            <span th:if="${pedido.id != null}">
                Editar Pedido
            </span>

        </div>

        <div class="card-body">

            <form th:action="@{/pedidos/guardar}"
                  method="post"
                  th:object="${pedido}">

                <input type="hidden"
                       th:field="*{id}">

                <div class="mb-3">

                    <label class="form-label">
                        Usuario
                    </label>

                    <select class="form-select"
                            th:field="*{usuarioId}"
                            required>

                        <option value="">
                            Seleccione Usuario
                        </option>

                        <option
                                th:each="u : ${usuarios}"
                                th:value="${u.id}"
                                th:text="${u.nombre}">
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Producto
                    </label>

                    <select
                            id="producto"
                            class="form-select"
                            th:field="*{productoId}"
                            required>

                        <option value="">
                            Seleccione Producto
                        </option>

                        <option
                                th:each="p : ${productos}"
                                th:value="${p.id}"
                                th:data-precio="${p.precio}"
                                th:data-stock="${p.stock}"
                                th:text="${p.nombre + ' | Precio: S/ ' + p.precio + ' | Stock: ' + p.stock}">
                        </option>

                    </select>

                    <div class="mt-2">

                        <strong>Stock disponible:</strong>

                        <span id="stockDisponible">
                            0
                        </span>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Cantidad
                    </label>

                    <input
                            id="cantidad"
                            type="number"
                            min="1"
                            class="form-control"
                            th:field="*{cantidad}"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Total
                    </label>

                    <input
                            id="total"
                            type="number"
                            step="0.01"
                            class="form-control"
                            th:field="*{total}"
                            readonly>

                </div>

                <button type="submit"
                        class="btn btn-success">

                    <span th:if="${pedido.id == null}">
                        Guardar Pedido
                    </span>

                    <span th:if="${pedido.id != null}">
                        Actualizar Pedido
                    </span>

                </button>

            </form>

        </div>

    </div>

    <div class="card">

        <div class="card-header">
            Lista de Pedidos
        </div>

        <div class="card-body">

            <table class="table table-striped">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Usuario ID</th>
                    <th>Producto ID</th>
                    <th>Cantidad</th>
                    <th>Total</th>
                    <th>Acciones</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="p : ${pedidos}">

                    <td th:text="${p.id}"></td>

                    <td th:text="${p.usuarioId}"></td>

                    <td th:text="${p.productoId}"></td>

                    <td th:text="${p.cantidad}"></td>

                    <td th:text="${p.total}"></td>

                    <td>

                        <a th:href="@{/pedidos/editar/{id}(id=${p.id})}"
                           class="btn btn-warning btn-sm">
                            Editar
                        </a>

                        <a th:href="@{/pedidos/eliminar/{id}(id=${p.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Eliminar pedido?')">
                            Eliminar
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

    function calcularTotal() {

        const producto =
            document.getElementById("producto");

        const cantidad =
            document.getElementById("cantidad");

        const total =
            document.getElementById("total");

        const stockDisponible =
            document.getElementById("stockDisponible");

        if (producto.selectedIndex <= 0) {

            total.value = "";
            stockDisponible.innerText = "0";

            return;
        }

        const opcion =
            producto.options[
                producto.selectedIndex
            ];

        const precio =
            parseFloat(
                opcion.dataset.precio
            );

        const stock =
            parseInt(
                opcion.dataset.stock
            );

        stockDisponible.innerText =
            stock;

        const cantidadValor =
            parseInt(cantidad.value) || 0;

        total.value =
            (precio * cantidadValor)
                .toFixed(2);

        if (cantidadValor > stock) {

            alert(
                "La cantidad supera el stock disponible"
            );

            cantidad.value = stock;

            total.value =
                (precio * stock)
                    .toFixed(2);
        }
    }

    document
        .getElementById("producto")
        .addEventListener(
            "change",
            calcularTotal
        );

    document
        .getElementById("cantidad")
        .addEventListener(
            "input",
            calcularTotal
        );

</script>

</body>

</html>
