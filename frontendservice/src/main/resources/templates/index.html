<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Sistema de Ventas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Sistema de Ventas
    </h1>

    <div class="row">

        <div class="col-md-4">

            <div class="card text-center">

                <div class="card-body">

                    <h2 th:text="${totalUsuarios}"></h2>

                    <h4>Usuarios</h4>

                    <a href="/usuarios"
                       class="btn btn-primary">
                        Gestionar
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center">

                <div class="card-body">

                    <h2 th:text="${totalProductos}"></h2>

                    <h4>Productos</h4>

                    <a href="/productos"
                       class="btn btn-success">
                        Gestionar
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center">

                <div class="card-body">

                    <h2 th:text="${totalPedidos}"></h2>

                    <h4>Pedidos</h4>

                    <a href="/pedidos"
                       class="btn btn-warning">
                        Gestionar
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
