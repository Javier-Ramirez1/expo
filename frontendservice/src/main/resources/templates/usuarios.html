<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Usuarios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h1 class="mb-4">
        Gestión de Usuarios
    </h1>

    <a href="/"
       class="btn btn-secondary mb-3">
        Volver al Inicio
    </a>

    <div class="card mb-4">

        <div class="card-header">

            <span th:if="${usuario.id == null}">
                Registrar Usuario
            </span>

            <span th:if="${usuario.id != null}">
                Editar Usuario
            </span>

        </div>

        <div class="card-body">

            <form th:action="@{/usuarios/guardar}"
                  method="post"
                  th:object="${usuario}">

                <input type="hidden"
                       th:field="*{id}">

                <div class="mb-3">

                    <label>Nombre</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{nombre}"
                           required>

                </div>

                <div class="mb-3">

                    <label>Correo</label>

                    <input type="email"
                           class="form-control"
                           th:field="*{correo}"
                           required>

                </div>

                <div class="mb-3">

                    <label>Teléfono</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{telefono}"
                           required>

                </div>

                <button type="submit"
                        class="btn btn-success">

                    <span th:if="${usuario.id == null}">
                        Guardar Usuario
                    </span>

                    <span th:if="${usuario.id != null}">
                        Actualizar Usuario
                    </span>

                </button>

            </form>

        </div>

    </div>

    <div class="card">

        <div class="card-header">
            Lista de Usuarios
        </div>

        <div class="card-body">

            <table class="table table-striped">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Teléfono</th>
                    <th>Acciones</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="u : ${usuarios}">

                    <td th:text="${u.id}"></td>

                    <td th:text="${u.nombre}"></td>

                    <td th:text="${u.correo}"></td>

                    <td th:text="${u.telefono}"></td>

                    <td>

                        <a th:href="@{/usuarios/editar/{id}(id=${u.id})}"
                           class="btn btn-warning btn-sm">
                            Editar
                        </a>

                        <a th:href="@{/usuarios/eliminar/{id}(id=${u.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Eliminar usuario?')">
                            Eliminar
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
