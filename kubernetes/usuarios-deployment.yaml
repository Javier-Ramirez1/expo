apiVersion: apps/v1
kind: Deployment

metadata:
  name: usuarios-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: usuarios

  template:
    metadata:
      labels:
        app: usuarios

    spec:
      containers:
        - name: usuarios
          image: usuarios-service:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8081

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"